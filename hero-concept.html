<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Concept 5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --dark: #4a2b3c;
    --light: #f4efea;
    --accent: #d3eb9a;
    --lavender: #c5b8e8;
    --serif: 'Instrument Serif', Georgia, serif;
    --sans: 'Inter', Arial, sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }
 
  body {
    background: var(--light);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }
 
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
 
  /* ── LEFT ── */
  .hero-left {
    position: relative;
    overflow: hidden;
    min-height: 100vh;
  }
 
  .hero-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }
 
  .hero-cutout {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    height: 90%;
    width: auto;
    object-fit: contain;
    object-position: bottom;
    z-index: 2;
  }
 
  /* ── RIGHT ── */
  .hero-right {
    background: var(--light);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 48px;
  }
 
  /* ── PANEL ── */
  .hero-panel {
    background: var(--dark);
    border-radius: 24px;
    padding: 52px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
 
  .hero-name {
    font-family: var(--serif);
    font-weight: 400;
    font-style: normal;
    font-size: clamp(60px, 8vw, 120px);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--lavender);
    line-height: 1;
    margin-bottom: 14px;
  }
 
  .hero-def-pos {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    display: block;
    margin-bottom: 32px;
  }
 
  .hero-def-text {
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    color: var(--light);
    font-weight: 400;
    margin-bottom: 28px;
    opacity: 0.9;
  }
 
  .hero-divider {
    width: 36px;
    height: 2px;
    background: var(--accent);
    margin: 0 auto 28px;
  }
 
  .hero-links {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 20px;
    justify-content: center;
  }
 
  .hero-links a {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--lavender);
    text-decoration: underline;
    text-underline-offset: 4px;
    text-decoration-thickness: 1px;
    transition: color 0.15s;
  }
 
  .hero-links a:hover { color: var(--accent); }
 
  /* ── MOBILE ── */
  @media (max-width: 768px) {
    .hero {
      grid-template-columns: 1fr;
      min-height: auto;
    }
 
    .hero-left { min-height: 65vw; }
 
    .hero-right { padding: 40px 24px 60px; }
 
    .hero-panel { padding: 40px 28px; }
 
    .hero-name { font-size: clamp(52px, 16vw, 80px); }
  }
</style>
</head>
<body>
 
<section class="hero">
 
  <div class="hero-left">
    <img
      class="hero-bg"
      src="https://raw.githubusercontent.com/itsgariele-dev/living-portfolio/refs/heads/main/images/background-desktop-wallpaper.jpg"
      alt="Background"
    />
    <img
      class="hero-cutout"
      src="https://raw.githubusercontent.com/itsgariele-dev/living-portfolio/refs/heads/main/images/plane.png"
      alt="Gariele"
    />
  </div>
 
  <div class="hero-right">
    <div class="hero-panel">
      <h1 class="hero-name">Gariele</h1>
      <span class="hero-def-pos">noun &nbsp;/&nbsp; gary-elle</span>
      <p class="hero-def-text">A chronically-obsessive side quest collector, serial builder of things nobody asked for, on a slow but inevitable mission to take over the digital world.</p>
      <div class="hero-divider"></div>
      <nav class="hero-links">
        <a href="#travel">Travel Guides</a>
        <a href="#books">Books</a>
        <a href="#tools">Tools</a>
        <a href="#photography">Photography</a>
        <a href="#about">About</a>
        <a href="#wallpapers">Free Wallpapers</a>
      </nav>
    </div>
  </div>
 
</section>
 
</body>
</html>
