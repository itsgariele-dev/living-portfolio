<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Concept</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dark: #4a2b3c;
    --light: #f4efea;
    --accent: #d3eb9a;
    --lavender: #c5b8e8;
    --serif: 'Instrument Serif', Georgia, serif;
    --sans: 'Inter', Arial, sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  body {
    background: var(--light);
    font-family: var(--sans);
    min-height: 100vh;
  }

  .hero {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 100vh;
    position: relative;
  }

  /* ── LEFT COLUMN ── */
  .hero-left {
    position: relative;
    overflow: hidden;
    background: #e8e4df;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    opacity: 0.85;
  }

  .hero-cutout {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    max-width: 480px;
    display: block;
    z-index: 2;
  }

  /* ── RIGHT COLUMN ── */
  .hero-right {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 48px;
    background: transparent;
  }

  .hero-panel {
    background: var(--light);
    border: 2px solid var(--dark);
    border-radius: 20px;
    padding: 52px 48px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }

  .hero-kicker {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dark);
    opacity: 0.5;
    margin-bottom: 28px;
    display: block;
  }

  .hero-heading {
    font-family: var(--serif);
    font-size: clamp(32px, 4vw, 52px);
    font-weight: 400;
    color: var(--dark);
    line-height: 1.1;
    margin-bottom: 20px;
  }

  .hero-heading em {
    font-style: italic;
  }

  .hero-sub {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--dark);
    opacity: 0.55;
    margin-bottom: 40px;
    display: block;
  }

  .hero-divider {
    width: 40px;
    height: 2px;
    background: var(--accent);
    margin: 0 auto 40px;
  }

  .hero-links {
    display: flex;
    flex-wrap: wrap;
    gap: 12px 20px;
    justify-content: center;
  }

  .hero-links a {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--lavender);
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-thickness: 1.5px;
    transition: color 0.15s;
  }

  .hero-links a:hover {
    color: var(--accent);
  }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    .hero {
      grid-template-columns: 1fr;
      min-height: auto;
    }

    .hero-left {
      height: 60vw;
      min-height: 280px;
    }

    .hero-right {
      padding: 40px 24px 60px;
    }

    .hero-panel {
      padding: 36px 28px;
    }
  }
</style>
</head>
<body>

<section class="hero">

  <div class="hero-left">
    <img
  class="hero-bg"
  src="https://raw.githubusercontent.com/itsgariele-dev/living-portfolio/refs/heads/main/images/background-desktop-wallpaper.jpg"
  alt="Background"
/>
<img
  class="hero-cutout"
  src="https://raw.githubusercontent.com/itsgariele-dev/living-portfolio/refs/heads/main/images/plane.png"
  alt="Gariele"
/>
  </div>

  <div class="hero-right">
    <div class="hero-panel">
      <span class="hero-kicker">Creative Strategist on Endless Side Quests</span>
      <h1 class="hero-heading">Welcome to my <em>cozy corner</em> of the internet</h1>
      <span class="hero-sub">Gariele Wright &nbsp;✦&nbsp; Victoria, BC</span>
      <div class="hero-divider"></div>
      <nav class="hero-links">
        <a href="#travel">Travel Guides</a>
        <a href="#books">Books</a>
        <a href="#tools">Tools</a>
        <a href="#photography">Photography</a>
        <a href="#about">About</a>
        <a href="#wallpapers">Free Wallpapers</a>
      </nav>
    </div>
  </div>

</section>

</body>
</html>
